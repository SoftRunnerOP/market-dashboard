<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Office HQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes typing {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-2px); opacity: 0.8; }
    }
    @keyframes lampPulse {
      0%,100% { box-shadow: 0 0 0 rgba(34,197,94,0.0); }
      50% { box-shadow: 0 0 16px rgba(34,197,94,0.55); }
    }
    @keyframes idleBlink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .typing { animation: typing 0.55s infinite; }
    .lamp-working { animation: lampPulse 1.4s infinite; }
    .idle-blink { animation: idleBlink 1.6s infinite; }
    .desk {
      background: linear-gradient(180deg,#161b22,#0f1115);
      border: 1px solid #2b313c;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4">
  <div class="max-w-6xl mx-auto space-y-4">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">🏢 Офис ботов</h1>
      <div id="gen" class="text-sm text-zinc-400">обновление…</div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="summary"></div>

    <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
      <h2 class="font-semibold mb-3">Вид сверху</h2>
      <div id="office" class="grid md:grid-cols-3 gap-3"></div>
      <p class="text-xs text-zinc-500 mt-3">Лампа стола: 🟢 работает · 🟡 в ожидании · ⚫ оффлайн</p>
    </div>

    <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-3">
      <h2 class="font-semibold mb-2">Список ботов</h2>
      <div id="cards" class="grid md:grid-cols-2 gap-3"></div>
    </div>
  </div>

  <script>
    function pill(status){
      if(status==='working') return 'bg-emerald-600/25 text-emerald-300 border-emerald-600/40';
      if(status==='idle') return 'bg-amber-600/25 text-amber-300 border-amber-600/40';
      return 'bg-zinc-700/30 text-zinc-300 border-zinc-700/50';
    }
    function lamp(status){
      if(status==='working') return '🟢';
      if(status==='idle') return '🟡';
      return '⚫';
    }

    async function render(){
      const res = await fetch('hq_data.json?t=' + Date.now(), {cache:'no-cache'});
      const data = await res.json();
      document.getElementById('gen').textContent = 'обновлено: ' + (data.generatedAt || '-');

      const s = data.summary || {};
      document.getElementById('summary').innerHTML = `
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Ботов</div><div class="text-2xl font-bold">${s.bots||0}</div></div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Работают</div><div class="text-2xl font-bold text-emerald-300">${s.working||0}</div></div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Ожидают</div><div class="text-2xl font-bold text-amber-300">${s.idle||0}</div></div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Оффлайн</div><div class="text-2xl font-bold">${s.offline||0}</div></div>
      `;

      const bots = data.bots || [];
      // Director in center
      const director = bots.find(b => b.role === 'director') || {name:'Director', status:'working', role:'director'};
      const others = bots.filter(b => b.role !== 'director');

      function deskCard(name, status, role, isDirector=false){
        const lampEmoji = lamp(status);
        const lampClass = status==='working' ? 'lamp-working' : (status==='idle' ? 'idle-blink' : '');
        const workerAnim = status==='working' ? 'typing' : '';
        const actor = isDirector ? '🧑‍💼' : '🤖';
        const action = status==='working' ? 'печатает…' : (status==='idle' ? 'ждёт задачу' : 'оффлайн');
        return `
          <div class="desk rounded-xl p-3">
            <div class="flex items-center justify-between">
              <div class="text-xs text-zinc-500">${isDirector ? 'Центр управления' : 'Рабочее место'}</div>
              <div class="text-xs ${status==='working'?'text-emerald-300':status==='idle'?'text-amber-300':'text-zinc-400'}">${status}</div>
            </div>
            <div class="mt-2 flex items-end justify-between gap-2">
              <div>
                <div class="font-semibold">${actor} ${name}</div>
                <div class="text-xs text-zinc-400">роль: ${role || '-'}</div>
              </div>
              <div class="text-right">
                <div class="text-lg ${lampClass}">${lampEmoji}</div>
                <div class="text-[11px] text-zinc-400 ${workerAnim}">${action}</div>
              </div>
            </div>
            <div class="mt-2 h-2 rounded bg-zinc-800 overflow-hidden">
              <div class="h-2 ${status==='working'?'bg-emerald-500':status==='idle'?'bg-amber-500':'bg-zinc-600'}" style="width:${status==='working'?'86':status==='idle'?'42':'8'}%"></div>
            </div>
          </div>
        `;
      }

      document.getElementById('office').innerHTML = `
        <div class="md:col-span-3">${deskCard(director.name, director.status, director.role, true)}</div>
        ${others.map(b => deskCard(b.name, b.status, b.role, false)).join('')}
      `;

      const cards = bots.map(b => `
        <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-3">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="font-semibold leading-tight">${b.name||'-'}</div>
              <div class="text-xs text-zinc-400 mt-1 break-all">id: ${b.id||'-'}</div>
            </div>
            <span class="text-xs px-2 py-1 rounded-full border ${pill(b.status)}">${b.status}</span>
          </div>
          <div class="mt-2 text-xs text-zinc-400">роль: ${b.role||'-'}</div>
          <div class="mt-1 text-xs text-zinc-500 break-all">${b.activeKey || 'нет активной сессии'}</div>
        </div>
      `).join('');

      document.getElementById('cards').innerHTML = cards || '<div class="text-zinc-400">Нет данных</div>';
    }

    render();
    setInterval(render, 15000);
  </script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent HQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4">
  <div class="max-w-6xl mx-auto space-y-4">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">🧭 Agent HQ (Офис агентов)</h1>
      <div id="gen" class="text-sm text-zinc-400">обновление…</div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="summary"></div>

    <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-3">
      <h2 class="font-semibold mb-2">Состав команды</h2>
      <div id="cards" class="grid md:grid-cols-2 gap-3"></div>
    </div>

    <p class="text-xs text-zinc-500">Статусы: working (&lt;2 мин), idle (&lt;20 мин), offline.</p>
  </div>

  <script>
    function pill(status){
      if(status==='working') return 'bg-emerald-600/25 text-emerald-300 border-emerald-600/40';
      if(status==='idle') return 'bg-amber-600/25 text-amber-300 border-amber-600/40';
      return 'bg-zinc-700/30 text-zinc-300 border-zinc-700/50';
    }

    async function render(){
      const res = await fetch('hq_data.json?t=' + Date.now(), {cache:'no-cache'});
      const data = await res.json();
      document.getElementById('gen').textContent = 'обновлено: ' + (data.generatedAt || '-');

      const s = data.summary || {};
      document.getElementById('summary').innerHTML = `
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Всего</div><div class="text-2xl font-bold">${s.total||0}</div></div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Работают</div><div class="text-2xl font-bold text-emerald-300">${s.working||0}</div></div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Ожидают</div><div class="text-2xl font-bold text-amber-300">${s.idle||0}</div></div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3"><div class="text-xs text-zinc-400">Неактивны</div><div class="text-2xl font-bold">${s.offline||0}</div></div>
      `;

      const cards = (data.sessions || []).map(c => `
        <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-3">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="font-semibold leading-tight">${c.name||'-'}</div>
              <div class="text-xs text-zinc-400 mt-1 break-all">${c.key||'-'}</div>
            </div>
            <span class="text-xs px-2 py-1 rounded-full border ${pill(c.status)}">${c.status}</span>
          </div>
          <div class="mt-2 text-xs text-zinc-400">model: ${c.model||'-'} · kind: ${c.kind||'-'}</div>
        </div>
      `).join('');

      document.getElementById('cards').innerHTML = cards || '<div class="text-zinc-400">Нет данных</div>';
    }

    render();
    setInterval(render, 15000);
  </script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Team Office</title>
  <style>
    body { margin:0; background:#0b0f14; color:#e5e7eb; font-family: ui-monospace, Menlo, monospace; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 14px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .chip { background:#111827; border:1px solid #263043; border-radius:10px; padding:6px 10px; font-size:12px; }
    canvas { width:100%; height:auto; image-rendering: pixelated; border:1px solid #2a3346; border-radius:14px; background:#121826; }
    .hint { margin-top:8px; color:#94a3b8; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h2 style="margin:0">🏢 Crypto Start Team — Pixel Office</h2>
      <div id="ts" class="chip">обновление…</div>
    </div>
    <canvas id="cv" width="1120" height="760"></canvas>
    <div class="hint">🟢 working · 🟡 idle · ⚫ offline · zzz = сонный режим</div>
  </div>

  <script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    let layout = null;

    function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
    function txt(t, x, y, c = '#111', s = 11) { ctx.fillStyle = c; ctx.font = `${s}px ui-monospace`; ctx.fillText(t, x, y); }
    function statusColor(st) { return st === 'working' ? '#22c55e' : st === 'idle' ? '#f59e0b' : '#64748b'; }

    function drawTopWall(l) {
      const top = l.wall.top;
      rect(top.x, top.y, top.w, top.h, '#8a5330');
      for (let x = 0; x < top.w; x += 8) rect(x, top.y, 2, top.h, '#754527');

      rect(l.wall.trim.x, l.wall.trim.y, l.wall.trim.w, l.wall.trim.h, '#6f4126');

      // cabinet/bookshelf center
      rect(496, 10, 128, 84, '#5c3624');
      rect(500, 14, 120, 76, '#6b3f2a');
      for (let i = 0; i < 5; i++) {
        const bx = 508 + i * 22;
        rect(bx, 22, 13, 24, ['#60a5fa', '#f59e0b', '#34d399', '#f87171', '#a78bfa'][i]);
        rect(bx, 52, 13, 24, ['#f59e0b', '#34d399', '#f87171', '#a78bfa', '#60a5fa'][i]);
      }

      for (const w of l.windows) {
        rect(w.x, w.y, w.w, w.h, '#bfc7d2');
        rect(w.x + 2, w.y + 2, w.w - 4, w.h - 4, '#f8fafc');
        rect(w.x + Math.floor(w.w / 2) - 1, w.y + 2, 2, w.h - 4, '#d7dee8');
        rect(w.x + 2, w.y + Math.floor(w.h / 2), w.w - 4, 1, '#d7dee8');
      }
    }

    function drawFloor(l) {
      rect(0, 108, cv.width, cv.height - 108, '#d7cfb2');
      for (let y = 108; y < cv.height; y += 20) rect(0, y, cv.width, 1, '#c8be9e');
      for (let x = 0; x < cv.width; x += 20) rect(x, 108, 1, cv.height - 108, '#c8be9e');

      rect(l.wall.leftAccent.x, l.wall.leftAccent.y, l.wall.leftAccent.w, l.wall.leftAccent.h, '#1f2937');
      rect(l.wall.rightAccent.x, l.wall.rightAccent.y, l.wall.rightAccent.w, l.wall.rightAccent.h, '#1f2937');
    }

    function drawPlant(x, y) {
      rect(x + 4, y + 14, 12, 10, '#6b7280');
      rect(x, y + 2, 20, 14, '#15803d');
      rect(x + 4, y - 4, 12, 10, '#22c55e');
    }

    function drawSofa(s) {
      rect(s.x, s.y, s.w, s.h, '#1e3a8a');
      rect(s.x + 4, s.y + 4, s.w - 8, s.h - 10, '#3b82f6');
      rect(s.x + 8, s.y + s.h - 8, s.w - 16, 6, '#1e40af');
    }

    function drawLounge(l) {
      const z = l.lounge.zone;
      rect(z.x, z.y, z.w, z.h, '#d4ccb0');
      rect(z.x + 6, z.y + 6, z.w - 12, z.h - 12, '#cbc2a3');
      for (const s of l.lounge.sofas) drawSofa(s);
      const t = l.lounge.table;
      rect(t.x, t.y, t.w, t.h, '#6b7280');
      rect(t.x + 4, t.y + 4, t.w - 8, t.h - 8, '#9ca3af');
      txt('Lounge', l.labels.lounge.x, l.labels.lounge.y, '#334155', 12);
    }

    function drawAvatar(x, y, status, tick) {
      rect(x, y, 14, 12, ['#f1c27d', '#e5b98a', '#d9a97f'][tick % 3]);
      rect(x - 1, y + 11, 16, 8, '#4b5563');
      if (status === 'working') {
        rect(x - 4, y + 14, 3, 2, '#64748b');
        rect(x + 15, y + 14, 3, 2, '#64748b');
      }
      if (status === 'offline' && tick % 20 < 10) txt('zzz', x + 18, y + 7, '#64748b', 9);
    }

    function drawDesk(x, y, bot, tick, isDirector = false) {
      const st = bot ? bot.status : 'offline';
      const active = st === 'working';

      rect(x, y, 110, 84, '#f3f4f6');
      rect(x + 3, y + 3, 104, 78, '#ffffff');
      rect(x + 3, y + 75, 104, 6, '#d1d5db');

      rect(x + 42, y + 40, 26, 14, active ? (tick % 16 < 8 ? '#2563eb' : '#1d4ed8') : '#374151');
      rect(x + 40, y + 38, 30, 18, '#111827');

      rect(x + 47, y + 17, 16, 12, ['#f1c27d', '#e5b98a', '#d9a97f'][tick % 3]);
      rect(x + 50, y + 21, 2, 2, '#0b0b0b');
      rect(x + 58, y + 21, 2, 2, '#0b0b0b');
      if (st === 'working') rect(x + 54, y + 26, 3, 1, '#0b0b0b');
      else if (st === 'idle') rect(x + 53, y + 26, 5, 1, '#0b0b0b');
      else rect(x + 54, y + 26, 3, 1, '#64748b');

      if (active && tick % 6 < 3) rect(x + 36, y + 46, 4, 3, '#94a3b8');
      if (active && tick % 6 >= 3) rect(x + 70, y + 46, 4, 3, '#94a3b8');

      rect(x + 96, y + 8, 8, 8, statusColor(st));

      if (bot) drawAvatar(x + 84, y + 50, st, tick);

      if (bot) {
        const nickBg = st === 'working' ? '#14532d' : (st === 'idle' ? '#7c2d12' : '#334155');
        const nickFg = st === 'working' ? '#86efac' : (st === 'idle' ? '#fdba74' : '#cbd5e1');
        rect(x + 10, y + 86, 90, 12, nickBg);
        txt((isDirector ? 'Xenon' : (bot.name || 'Bot')).slice(0, 16), x + 14, y + 95, nickFg, 10);
      }
    }

    function normalizeBots(raw) {
      return (raw || [])
        .filter(b => b.role !== 'director')
        .map((b, i) => ({ id: b.id || `bot-${i}`, name: b.name || `Bot ${i + 1}`, status: b.status || 'offline', role: b.role || 'general' }));
    }

    function drawScene(data) {
      if (!layout) return;
      const tick = Math.floor(Date.now() / 120);
      ctx.clearRect(0, 0, cv.width, cv.height);

      drawTopWall(layout);
      drawFloor(layout);
      drawLounge(layout);

      for (const p of layout.plants) drawPlant(p.x, p.y);

      const label = layout.labels.team;
      rect(label.x, label.y, label.w, label.h, '#dcfce7');
      txt('✅ Crypto Start Team', label.x + 10, label.y + 16, '#166534', 13);

      if (layout.labels?.trading) {
        const l = layout.labels.trading;
        rect(l.x, l.y, l.w, l.h, '#e0f2fe');
        txt(l.text || 'Trading Group', l.x + 8, l.y + 15, '#075985', 12);
      }
      if (layout.labels?.design) {
        const l = layout.labels.design;
        rect(l.x, l.y, l.w, l.h, '#f5d0fe');
        txt(l.text || 'Design Team', l.x + 8, l.y + 15, '#86198f', 12);
      }

      const bots = normalizeBots(data.bots);
      const trading = bots.filter(b => (b.role || '').toLowerCase().includes('trad'));
      const design = bots.filter(b => (b.role || '').toLowerCase().includes('design'));
      const other = bots.filter(b => !trading.includes(b) && !design.includes(b));

      // seat regions: left-top for trading, right-top for design, rest for others
      const slotBots = new Array(layout.desks.length).fill(null);
      const tradingSlots = [0,1,2,6,7,8];
      const designSlots  = [3,4,5,9,10,11];
      const otherSlots = layout.desks.map((_,i)=>i).filter(i => !tradingSlots.includes(i) && !designSlots.includes(i));

      trading.forEach((b,idx)=>{ if (tradingSlots[idx] !== undefined) slotBots[tradingSlots[idx]] = b; });
      design.forEach((b,idx)=>{ if (designSlots[idx] !== undefined) slotBots[designSlots[idx]] = b; });
      other.forEach((b,idx)=>{ if (otherSlots[idx] !== undefined) slotBots[otherSlots[idx]] = b; });

      for (let i = 0; i < layout.desks.length; i++) {
        const d = layout.desks[i];
        drawDesk(d.x, d.y, slotBots[i], tick + i, false);
      }

      const dd = layout.directorDesk;
      drawDesk(dd.x, dd.y, { name: 'Xenon', status: 'working' }, tick, true);

      const w = bots.filter(b => b.status === 'working').length;
      const idle = bots.filter(b => b.status === 'idle').length;
      const off = bots.filter(b => b.status === 'offline').length;

      const stats = layout.labels.stats;
      rect(stats.x, stats.y, stats.w, stats.h, '#0f172a');
      txt(`WORK ${w}  IDLE ${idle}  OFF ${off}`, stats.x + 10, stats.y + 28, '#93c5fd', 12);
    }

    async function loadLayout() {
      const r = await fetch('layout.json?t=' + Date.now(), { cache: 'no-cache' });
      const l = await r.json();
      layout = l;
      if (l.canvas?.width && l.canvas?.height) {
        cv.width = l.canvas.width;
        cv.height = l.canvas.height;
      }
    }

    async function tick() {
      try {
        const r = await fetch('hq_data.json?t=' + Date.now(), { cache: 'no-cache' });
        const d = await r.json();
        document.getElementById('ts').textContent = 'обновлено: ' + (d.generatedAt || '-');
        drawScene(d);
      } catch {
        drawScene({ bots: [] });
      }
    }

    async function start() {
      try {
        await loadLayout();
      } catch (e) {
        document.getElementById('ts').textContent = 'ошибка layout.json';
        console.error(e);
        return;
      }
      await tick();
      setInterval(tick, 3000);
    }

    start();
  </script>
</body>
</html>

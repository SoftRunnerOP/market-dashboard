<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Team Office</title>
  <style>
    body { margin:0; background:#0b0f14; color:#e5e7eb; font-family: ui-monospace, Menlo, monospace; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 14px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .chip { background:#111827; border:1px solid #263043; border-radius:10px; padding:6px 10px; font-size:12px; }
    canvas { width:100%; height:auto; image-rendering: pixelated; border:1px solid #2a3346; border-radius:14px; background:#121826; }
    .hint { margin-top:8px; color:#94a3b8; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h2 style="margin:0">🏢 Crypto Start Team — Pixel Office</h2>
      <div id="ts" class="chip">обновление…</div>
    </div>
    <canvas id="cv" width="1120" height="760"></canvas>
    <div class="hint">🟢 working · 🟡 idle · ⚫ offline · zzz = сонный режим</div>
  </div>

  <script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');

    // Layout intentionally matched closer to your reference scene
    const deskSlots = [
      // top row
      {x:90,y:130},{x:250,y:130},{x:410,y:130},         {x:650,y:130},{x:810,y:130},{x:970,y:130},
      // second row
      {x:90,y:250},{x:250,y:250},{x:410,y:250},         {x:650,y:250},{x:810,y:250},{x:970,y:250},
      // center director
      {x:490,y:360, director:true},
      // bottom-left block
      {x:90,y:500},{x:250,y:500},{x:410,y:500},
      {x:90,y:620},{x:250,y:620},{x:410,y:620}
    ];

    function rect(x,y,w,h,c){ ctx.fillStyle = c; ctx.fillRect(x,y,w,h); }
    function txt(t,x,y,c='#111',s=11){ ctx.fillStyle=c; ctx.font=`${s}px ui-monospace`; ctx.fillText(t,x,y); }
    function statusColor(st){ return st==='working' ? '#22c55e' : st==='idle' ? '#f59e0b' : '#64748b'; }

    function drawWoodHeader(){
      for(let x=0; x<cv.width; x+=8) rect(x,0,8,96,(x/8)%2===0?'#8f4e2f':'#9b5634');
      // curtains/windows
      const win=[80,260,440,760,940];
      for(const wx of win){ rect(wx,12,58,34,'#cbd5e1'); rect(wx+20,8,18,8,'#e5e7eb'); }
      // bookshelf center
      rect(500,10,120,72,'#6b3f2a');
      for(let i=0;i<5;i++){
        rect(506+i*22,18,14,22,['#60a5fa','#f59e0b','#34d399','#f87171','#a78bfa'][i]);
        rect(506+i*22,46,14,22,['#f59e0b','#34d399','#f87171','#a78bfa','#60a5fa'][i]);
      }
    }

    function drawTileFloor(){
      for(let y=96; y<cv.height; y+=20){
        for(let x=0; x<cv.width; x+=20){
          const c=((x/20+y/20)%2===0)?'#d8cfb2':'#d0c6a6';
          rect(x,y,20,20,c); rect(x,y,1,20,'#c2b893'); rect(x,y,20,1,'#c2b893');
        }
      }
    }

    function drawPlant(x,y){
      rect(x+4,y+14,12,10,'#6b7280');
      rect(x,y+2,20,14,'#15803d');
      rect(x+4,y-4,12,10,'#22c55e');
    }

    function drawLamp(x,y){
      rect(x+5,y,3,20,'#6b7280');
      rect(x,y+16,12,4,'#9ca3af');
      rect(x+2,y-2,8,4,'#fef3c7');
    }

    function drawFireExtinguisher(x,y){
      rect(x,y,6,16,'#ef4444');
      rect(x+1,y-2,4,2,'#9ca3af');
      rect(x+5,y+2,2,2,'#9ca3af');
    }

    function drawDesk(x,y,bot,tick,isDirector=false){
      const st = bot ? bot.status : 'offline';
      const active = st==='working';

      // desk with chair like reference
      rect(x,y,110,84,'#f3f4f6');
      rect(x+3,y+3,104,78,'#ffffff');
      rect(x+3,y+75,104,6,'#d1d5db');

      // laptop area
      rect(x+40,y+38,30,18,'#111827');
      rect(x+42,y+40,26,14,active?(tick%16<8?'#2563eb':'#1d4ed8'):'#374151');

      // pixel face (top-view)
      if(bot){
        rect(x+47,y+17,16,12,['#f1c27d','#e5b98a','#d9a97f'][tick%3]);
        rect(x+50,y+21,2,2,'#0b0b0b');
        rect(x+58,y+21,2,2,'#0b0b0b');
        if(st==='working') rect(x+54,y+26,3,1,'#0b0b0b');
        else if(st==='idle') rect(x+53,y+26,5,1,'#0b0b0b');
        else rect(x+54,y+26,3,1,'#64748b');
      }

      // hands typing
      if(active && tick%6<3){ rect(x+36,y+46,4,3,'#94a3b8'); }
      if(active && tick%6>=3){ rect(x+70,y+46,4,3,'#94a3b8'); }

      // lamp indicator top-right desk
      rect(x+96,y+8,8,8,statusColor(st));
      if(st==='offline' && bot && tick%20<10) txt('zzz', x+76, y+18, '#64748b', 9);

      // nameplate colored by status
      if(bot){
        const nickBg = st==='working' ? '#14532d' : (st==='idle' ? '#7c2d12' : '#334155');
        const nickFg = st==='working' ? '#86efac' : (st==='idle' ? '#fdba74' : '#cbd5e1');
        rect(x+10,y+86,90,12,nickBg);
        txt((isDirector?'Xenon':bot.name||'Bot').slice(0,16),x+14,y+95,nickFg,10);
      }
    }

    function normalizeBots(raw){
      return (raw||[])
        .filter(b=>b.role!=='director')
        .map((b,i)=>({id:b.id||`bot-${i}`,name:b.name||`Bot ${i+1}`,status:b.status||'offline',role:b.role||'general'}));
    }

    function drawScene(data){
      const tick=Math.floor(Date.now()/120);
      ctx.clearRect(0,0,cv.width,cv.height);
      drawWoodHeader();
      drawTileFloor();

      // decor
      drawPlant(520,305); drawPlant(390,360); drawPlant(700,360);
      drawPlant(390,440); drawPlant(700,440);
      drawLamp(520,250); drawLamp(620,250);
      drawFireExtinguisher(1085,205); drawFireExtinguisher(1085,545);

      // team label
      rect(170,110,190,24,'#dcfce7'); txt('✅ Crypto Start Team',182,126,'#166534',13);

      const bots = normalizeBots(data.bots);
      let bi=0;
      for(const s of deskSlots){
        if(s.director){
          drawDesk(s.x,s.y,{name:'Xenon',status:'working'},tick,true);
        }else{
          drawDesk(s.x,s.y,bots[bi]||null,tick+bi,false);
          bi++;
        }
      }

      // summary panel
      const w=bots.filter(b=>b.status==='working').length;
      const idle=bots.filter(b=>b.status==='idle').length;
      const off=bots.filter(b=>b.status==='offline').length;
      rect(900,100,190,48,'#0f172a');
      txt(`WORK ${w}  IDLE ${idle}  OFF ${off}`,910,128,'#93c5fd',12);
    }

    async function tick(){
      try{
        const r=await fetch('hq_data.json?t='+Date.now(),{cache:'no-cache'});
        const d=await r.json();
        document.getElementById('ts').textContent='обновлено: '+(d.generatedAt||'-');
        drawScene(d);
      }catch{ drawScene({bots:[]}); }
    }

    tick();
    setInterval(tick,3000);
  </script>
</body>
</html>

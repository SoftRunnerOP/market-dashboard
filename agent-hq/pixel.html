<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Office HQ</title>
  <style>
    body{margin:0;background:#090d14;color:#e5e7eb;font-family:ui-monospace,Menlo,monospace}
    .wrap{max-width:1180px;margin:0 auto;padding:14px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .chip{background:#101826;border:1px solid #2a3346;border-radius:10px;padding:6px 10px;font-size:12px}
    canvas{width:100%;height:auto;image-rendering:pixelated;background:#0e1520;border:1px solid #263043;border-radius:14px}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:#a6b0c2}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h2 style="margin:0">🏢 Pixel Office HQ v3</h2>
    <div id="ts" class="chip">обновление…</div>
  </div>
  <canvas id="cv" width="1120" height="760"></canvas>
  <div class="legend">
    <span class="chip">🟢 working</span><span class="chip">🟡 idle</span><span class="chip">⚫ offline</span><span class="chip">мест: 24</span>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const seats=[]; let id=0;
for(let r=0;r<4;r++) for(let c=0;c<6;c++) seats.push({id:id++,x:55+c*175,y:140+r*145});

function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h)}
function txt(t,x,y,c='#d1d5db',s=12){ctx.fillStyle=c;ctx.font=`${s}px ui-monospace`;ctx.fillText(t,x,y)}
function lamp(st){return st==='working'?'#22c55e':st==='idle'?'#f59e0b':'#64748b'}

function drawFloor(){
  for(let y=0;y<cv.height;y+=24){for(let x=0;x<cv.width;x+=24){rect(x,y,24,24,((x+y)/24)%2===0?'#111827':'#0f172a')}}
  rect(0,0,cv.width,44,'#1f2937'); rect(0,cv.height-30,cv.width,30,'#1f2937'); rect(0,0,24,cv.height,'#1f2937'); rect(cv.width-24,0,24,cv.height,'#1f2937');
  for(let i=0;i<5;i++){ const x=90+i*210; rect(x,10,150,20,'#1d4ed8'); rect(x+2,12,146,16,'#60a5fa'); }
}

function drawDesk(slot,bot,t){
  const x=slot.x,y=slot.y,st=bot?bot.status:'offline';
  rect(x,y,120,64,'#1f2937'); rect(x+3,y+3,114,58,'#0f172a');
  rect(x+38,y+8,44,24,'#334155'); rect(x+40,y+10,40,20,st==='working'?(t%20<10?'#2563eb':'#1d4ed8'):'#111827');
  rect(x+45,y+36+(st==='working'&&t%6<3?1:0),35,7,'#4b5563');
  rect(x+88,y+8,10,10,lamp(st));

  // person (bigger)
  if(bot){
    rect(x+52,y+44,10,10,'#f1c27d'); // head
    rect(x+50,y+54,14,10,'#64748b'); // body
    if(st==='working'){ rect(x+46,y+56,4,3,'#94a3b8'); rect(x+64,y+56,4,3,'#94a3b8'); }
    txt(bot.name||'Bot',x,y+79,'#dbeafe',10);
    txt(bot.role||'-',x,y+91,'#93c5fd',9);
    if(st==='working') txt('печатает...',x+66,y+91,'#34d399',8);
    if(st==='idle') txt('ожидание',x+70,y+91,'#fbbf24',8);
  }else{
    txt('Свободно',x,y+84,'#64748b',10);
  }
}

function drawDirector(d){
  rect(370,52,380,70,'#0f172a'); rect(374,56,372,62,'#1e293b');
  txt('👔 Директор: Main',392,82,'#bfdbfe',18);
  const s=d.summary||{working:0,idle:0,offline:0};
  txt(`🟢 ${s.working}   🟡 ${s.idle}   ⚫ ${s.offline}`,392,103,'#93c5fd',14);
}

function draw(data){
  ctx.clearRect(0,0,cv.width,cv.height);
  drawFloor(); drawDirector(data);
  const bots=(data.bots||[]).filter(b=>b.role!=='director');
  const t=Math.floor(Date.now()/120);
  seats.forEach((s,i)=>drawDesk(s,bots[i]||null,t));
}

async function tick(){
  try{
    const r=await fetch('hq_data.json?t='+Date.now(),{cache:'no-cache'}); const d=await r.json();
    document.getElementById('ts').textContent='обновлено: '+(d.generatedAt||'-');
    draw(d);
  }catch{ draw({bots:[],summary:{}}); }
}

tick(); setInterval(tick,3000);
</script>
</body>
</html>

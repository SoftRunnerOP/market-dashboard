<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Market Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500">Live Dashboard</h1>
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>
    <script>
        async function update() {
            try {
                // Binance API works directly in browser
                const symbols = ["BTCUSDT", "ETHUSDT", "DOGEUSDT"];
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                for (const sym of symbols) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                    const data = await res.json();
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between">
                            <span class="text-slate-400">${sym.replace('USDT', '')}</span>
                            <span class="font-bold">$${parseFloat(data.price).toLocaleString()}</span>
                        </div>
                    `;
                }
            } catch (e) {
                document.body.innerHTML = 'Error: ' + e.message;
            }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>

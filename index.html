<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500 italic uppercase tracking-widest">Market Intelligence</h1>
        
        <!-- Metrics -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500">F&G INDEX</p><p id="fng" class="text-lg font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500">BTC DOM</p><p id="dom" class="text-lg font-bold">--%</p></div>
        </div>
        
        <div id="grid" class="space-y-3"></div>
        <p id="status" class="text-[10px] text-slate-600 mt-4 text-center">Data: Live from GitHub</p>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch("data.json?t=" + new Date().getTime());
                const data = await res.json();
                
                document.getElementById('fng').innerText = data.fng;
                document.getElementById('dom').innerText = data.dom;
                
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                for (const [sym, info] of Object.entries(data.prices)) {
                    const color = info.change >= 0 ? 'text-green-500' : 'text-red-500';
                    const priceDisplay = sym === 'DOGE' ? info.price.toFixed(5) : info.price.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <div>
                                <p class="text-slate-400 font-bold text-sm tracking-wider">${sym}</p>
                                <p class="font-bold text-lg">$${priceDisplay}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-md ${color}">${info.change.toFixed(2)}%</p>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('status').innerText = 'Last updated: ' + data.updated;
            } catch(e) { document.getElementById('grid').innerHTML = '<p class="text-red-500">Waiting for data...</p>'; }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>

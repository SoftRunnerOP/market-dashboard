<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Market Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500">Live Dashboard</h1>
        <div id="status" class="text-[10px] text-slate-500 mb-4">Starting...</div>
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>
    <script>
        async function update() {
            const grid = document.getElementById('grid');
            const status = document.getElementById('status');
            
            try {
                status.innerText = 'Fetching...';
                const symbols = ["BTCUSDT", "ETHUSDT", "DOGEUSDT"];
                let html = '';
                
                for (const sym of symbols) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    
                    html += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold">${sym.replace('USDT', '')}</span>
                            <span class="font-bold text-lg">$${parseFloat(data.price).toLocaleString()}</span>
                        </div>
                    `;
                }
                grid.innerHTML = html;
                status.innerText = 'Live';
            } catch (e) {
                status.innerText = 'Error: ' + e.message;
            }
        }
        update();
        setInterval(update, 10000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-black text-blue-500 mb-6 italic uppercase tracking-widest">Market Intelligence</h1>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-blue-900/20 p-6 rounded-2xl border border-blue-500/30 text-center col-span-2 mb-2">
                <p class="text-[9px] text-slate-400 uppercase tracking-widest">Market Signal</p>
                <p id="signal" class="text-3xl font-black text-blue-400">LOADING...</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 uppercase">F&G</p><p id="fng" class="text-lg font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 uppercase">DOM</p><p id="dom" class="text-lg font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 uppercase">DXY</p><p id="dxy" class="text-lg font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><p class="text-[9px] text-slate-500 uppercase">ALT SEASON</p><p id="alt" class="text-lg font-bold">--</p></div>
        </div>

        <div id="grid" class="space-y-3"></div>
        <p class="text-center text-[10px] text-slate-600 mt-4">Last update: <span id="time">--</span></p>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch("data.json?t=" + new Date().getTime(), { cache: 'no-cache' });
                const data = await res.json();

                document.getElementById('signal').innerText = data.signal || 'NEUTRAL';
                document.getElementById('fng').innerText = data.fng || 'N/A';
                document.getElementById('dom').innerText = data.dom || 'N/A';
                document.getElementById('dxy').innerText = data.dxy || 'N/A';
                document.getElementById('alt').innerText = data.alt_season || 'N/A';
                document.getElementById('time').innerText = data.updated || 'N/A';

                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for (const [sym, info] of Object.entries(data.prices || {})) {
                    const color = (info.change ?? 0) >= 0 ? 'text-green-500' : 'text-red-500';
                    const price = sym === 'DOGE'
                        ? Number(info.price || 0).toFixed(5)
                        : Number(info.price || 0).toLocaleString(undefined, { minimumFractionDigits: 2 });
                    const change = Number(info.change || 0).toFixed(2);
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <div>
                                <p class="text-slate-400 font-bold text-sm tracking-wider">${sym}</p>
                                <p class="font-bold text-lg">$${price}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold ${color}">${change}%</p>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }
        update();
        setInterval(update, 15000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-xl font-bold mb-4 text-blue-500">Market Intelligence</h1>
        <div id="status" class="text-[10px] text-slate-500 font-mono mb-4">Initializing...</div>
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>
    <script>
        async function update() {
            try {
                document.getElementById('status').innerText = 'Fetching...';
                // Using corsproxy.io to bypass CORS issues
                const proxy = "https://corsproxy.io/?url=";
                
                const [priceRes, globalRes, fngRes] = await Promise.all([
                    fetch(proxy + encodeURIComponent("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,dogecoin&vs_currencies=usd&include_24hr_change=true")),
                    fetch(proxy + encodeURIComponent("https://api.coingecko.com/api/v3/global")),
                    fetch(proxy + encodeURIComponent("https://api.alternative.me/fng/"))
                ]);
                
                const data = await priceRes.json();
                const global = (await globalRes.json()).data;
                const fng = await fngRes.json();
                
                const grid = document.getElementById('grid');
                grid.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500">F&G</p>
                            <p class="text-xl font-bold">${fng.data[0].value}</p>
                        </div>
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500">BTC DOM</p>
                            <p class="text-xl font-bold">${global.market_cap_percentage.bitcoin.toFixed(1)}%</p>
                        </div>
                    </div>
                `;

                for (const [id, info] of Object.entries(data)) {
                    const color = info.usd_24h_change >= 0 ? 'text-green-500' : 'text-red-500';
                    const price = id === 'dogecoin' ? info.usd.toFixed(4) : info.usd.toLocaleString();
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl flex justify-between items-center border border-slate-800">
                            <div>
                                <p class="text-[10px] uppercase text-slate-500">${id}</p>
                                <p class="text-xl font-bold">$${price}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-md font-bold ${color}">${info.usd_24h_change.toFixed(2)}%</p>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('status').innerText = 'Live';
            } catch (e) {
                document.getElementById('status').innerText = 'Error: ' + e.message;
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>

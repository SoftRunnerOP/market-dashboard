<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-blue-500">Market Intelligence</h1>
            <div id="status" class="text-[10px] uppercase tracking-widest text-slate-500 font-mono">Syncing...</div>
        </header>
        
        <!-- Key Market Indicators -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <p class="text-[10px] uppercase text-slate-500">Fear & Greed</p>
                <div id="fng" class="text-2xl font-bold">--</div>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <p class="text-[10px] uppercase text-slate-500">BTC Dominance</p>
                <div id="dom" class="text-2xl font-bold">--%</div>
            </div>
        </div>

        <!-- Price Grid -->
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>
    <script>
        async function update() {
            try {
                const [priceRes, globalRes, fngRes] = await Promise.all([
                    fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,dogecoin,solana,cardano&vs_currencies=usd&include_24hr_change=true"),
                    fetch("https://api.coingecko.com/api/v3/global"),
                    fetch("https://api.alternative.me/fng/")
                ]);
                const data = await priceRes.json();
                const global = (await globalRes.json()).data;
                const fng = await fngRes.json();
                
                document.getElementById('dom').innerText = global.market_cap_percentage.bitcoin.toFixed(1) + '%';
                document.getElementById('fng').innerText = fng.data[0].value;

                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for (const [id, info] of Object.entries(data)) {
                    const color = info.usd_24h_change >= 0 ? 'text-green-500' : 'text-red-500';
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl flex justify-between items-center border border-slate-800">
                            <div>
                                <p class="text-sm font-bold uppercase text-slate-300">${id}</p>
                                <p class="text-2xl font-bold">$${info.usd.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold ${color}">${info.usd_24h_change.toFixed(2)}%</p>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('status').innerText = 'Live';
            } catch (e) { document.getElementById('status').innerText = 'Sync Error'; }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>

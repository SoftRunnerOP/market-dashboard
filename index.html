<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-black text-blue-500 mb-6 uppercase">Market Intelligence</h1>
        <!-- Signal Panel -->
        <div id="signal-card" class="bg-slate-900 p-6 rounded-2xl border border-slate-700 mb-6 text-center">
            <p class="text-[10px] text-slate-500 uppercase">Mr X Signal</p>
            <p id="signal" class="text-3xl font-black text-yellow-400">LOADING...</p>
        </div>
        <div id="grid" class="grid grid-cols-1 gap-3"></div>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch("data.json?t=" + new Date().getTime());
                const data = await res.json();
                document.getElementById('signal').innerText = data.signal;
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for (const [sym, info] of Object.entries(data.prices)) {
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold">${sym}</span>
                            <span class="font-bold text-lg">$${info.price.toLocaleString()}</span>
                        </div>
                    `;
                }
            } catch(e) {}
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>

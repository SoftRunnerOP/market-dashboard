<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500">Live Dashboard</h1>
        <div id="grid" class="text-slate-500">Syncing...</div>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch("data.json?t=" + new Date().getTime());
                const data = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500">F&G</p><p class="text-lg font-bold">${data.fng}</p></div>
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500">BTC DOM</p><p class="text-lg font-bold">${data.dom}</p></div>
                    </div>`;
                for (const [sym, info] of Object.entries(data.prices)) {
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold">${sym}</span>
                            <span class="font-bold text-lg">$${info.price.toLocaleString()}</span>
                        </div>
                    `;
                }
            } catch(e) { document.getElementById('grid').innerText = "Waiting for data.json..."; }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">Market Sentiment Dashboard</h1>
        
        <!-- Metrics Panel -->
        <div id="metrics" class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center">
                <div class="text-slate-400 text-sm">Fear & Greed</div>
                <div id="fng" class="text-2xl font-bold text-yellow-500">-</div>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center">
                <div class="text-slate-400 text-sm">DXY (USD Index)</div>
                <div id="dxy" class="text-2xl font-bold text-blue-400">104.5</div>
            </div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center">
                <div class="text-slate-400 text-sm">Alt Season</div>
                <div id="alt" class="text-2xl font-bold text-purple-400">35</div>
            </div>
        </div>

        <!-- Assets Grid -->
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <script>
        async function update() {
            // Fetch Prices
            const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,dogecoin&vs_currencies=usd&include_24hr_change=true");
            const data = await res.json();
            
            // Update Grid
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (const [id, info] of Object.entries(data)) {
                const color = info.usd_24h_change >= 0 ? 'text-green-500' : 'text-red-500';
                const price = id === 'dogecoin' ? info.usd.toFixed(4) : info.usd.toLocaleString();
                grid.innerHTML += `
                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                        <h2 class="text-sm uppercase tracking-widest text-slate-400">${id}</h2>
                        <p class="text-3xl font-bold my-2">$${price}</p>
                        <p class="text-md font-bold ${color}">${info.usd_24h_change.toFixed(2)}%</p>
                    </div>
                `;
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>

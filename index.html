<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Pro Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500">Live Prices</h1>
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
                const tickers = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                const targets = ["BTCUSDT", "ETHUSDT", "DOGEUSDT"];
                
                tickers.filter(t => targets.includes(t.symbol)).forEach(t => {
                    const price = parseFloat(t.lastPrice);
                    const sym = t.symbol.replace('USDT', '');
                    const priceDisplay = sym === 'DOGE' ? price.toFixed(5) : price.toLocaleString();
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold">${sym}</span>
                            <span class="font-bold text-lg">$${priceDisplay}</span>
                        </div>
                    `;
                });
            } catch(e) { document.getElementById('grid').innerHTML = '<p class="text-red-500">Sync Error</p>'; }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>

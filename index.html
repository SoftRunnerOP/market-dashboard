<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500 italic uppercase tracking-widest">Market Intelligence</h1>
        
        <!-- Metrics Grid -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[9px] text-slate-500 uppercase">F&G</p><p id="fng" class="text-lg font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[9px] text-slate-500 uppercase">BTC DOM</p><p id="dom" class="text-lg font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[9px] text-slate-500 uppercase">DXY (Est)</p><p id="dxy" class="text-lg font-bold">104.5</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[9px] text-slate-500 uppercase">ALT SEASON</p><p id="alt" class="text-lg font-bold">--</p></div>
        </div>
        
        <div id="grid" class="space-y-3"></div>
        <p class="text-center text-[10px] text-slate-600 mt-4">Last update: <span id="time">--</span></p>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch("data.json?t=" + new Date().getTime());
                const data = await res.json();
                
                document.getElementById('fng').innerText = data.fng || 'N/A';
                document.getElementById('dom').innerText = data.dom || 'N/A';
                document.getElementById('alt').innerText = parseInt(data.dom) < 40 ? 'HIGH' : 'LOW';
                document.getElementById('time').innerText = data.updated || 'N/A';
                
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for (const [sym, info] of Object.entries(data.prices)) {
                    const color = info.change >= 0 ? 'text-green-500' : 'text-red-500';
                    const price = sym === 'DOGE' ? info.price.toFixed(5) : info.price.toLocaleString(undefined, {minimumFractionDigits: 2});
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold">${sym}</span>
                            <span class="font-bold text-lg">$${price} <span class="${color} text-sm">(${info.change.toFixed(2)}%)</span></span>
                        </div>
                    `;
                }
            } catch(e) { console.log(e); }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>

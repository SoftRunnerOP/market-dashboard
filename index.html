<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr X Pro Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-black text-blue-500 mb-6 italic">MARKET INTELLIGENCE</h1>
        
        <!-- Metrics Panel -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-xl"><p class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Fear & Greed</p><p id="fng" class="text-2xl font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-xl"><p class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">BTC Dom</p><p id="dom" class="text-2xl font-bold">--%</p></div>
        </div>

        <!-- Prices -->
        <div id="grid" class="space-y-3"></div>
    </div>

    <script>
        const API_KEY = "CG-E1S3As15sNEzr2wPymEeUkLm";
        const headers = { 'x-cg-demo-api-key': API_KEY };

        async function update() {
            try {
                // Fetch Global Data
                const globalRes = await fetch("https://api.coingecko.com/api/v3/global", { headers });
                const global = await globalRes.json();
                document.getElementById('dom').innerText = global.data.market_cap_percentage.bitcoin.toFixed(1) + '%';

                // Fetch Prices
                const priceRes = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,dogecoin&vs_currencies=usd&include_24hr_change=true", { headers });
                const data = await priceRes.json();
                
                // Fetch F&G
                const fngRes = await fetch("https://api.alternative.me/fng/");
                const fng = await fngRes.json();
                document.getElementById('fng').innerText = fng.data[0].value;

                // Update Grid
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for (const [id, info] of Object.entries(data)) {
                    const price = id === 'dogecoin' ? info.usd.toFixed(4) : info.usd.toLocaleString();
                    const color = info.usd_24h_change >= 0 ? 'text-green-500' : 'text-red-500';
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold uppercase text-lg">${id.slice(0,3)}</span>
                            <span class="font-bold text-xl">$${price} <span class="${color} text-sm">(${info.usd_24h_change.toFixed(2)}%)</span></span>
                        </div>
                    `;
                }
            } catch(e) { console.log(e); }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-blue-400">Market Intelligence</h1>
        <div id="status" class="text-slate-500 mb-4 font-mono text-sm">Syncing...</div>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>
    <script>
        async function fetchProxied(url) {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            return JSON.parse(data.contents);
        }

        async function update() {
            try {
                document.getElementById('status').innerText = 'Updating...';
                // Fetch Data
                const [data, fngData] = await Promise.all([
                    fetchProxied("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,dogecoin&vs_currencies=usd&include_24hr_change=true"),
                    fetchProxied("https://api.alternative.me/fng/")
                ]);
                
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                // Add Metrics Card
                grid.innerHTML += `<div class="bg-slate-900 p-6 rounded-xl border border-blue-500">
                    <h2 class="text-xs uppercase tracking-widest text-slate-400">Fear & Greed</h2>
                    <p class="text-3xl font-bold">${fngData.data[0].value}</p>
                    <p class="text-sm text-blue-400">${fngData.data[0].value_classification}</p>
                </div>`;

                for (const [id, info] of Object.entries(data)) {
                    const change = info.usd_24h_change || 0;
                    const color = change >= 0 ? 'text-green-500' : 'text-red-500';
                    const price = id === 'dogecoin' ? info.usd.toFixed(4) : info.usd.toLocaleString();
                    grid.innerHTML += `
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                            <h2 class="text-xs uppercase tracking-widest text-slate-400">${id}</h2>
                            <p class="text-3xl font-bold my-2">$${price}</p>
                            <p class="text-md font-bold ${color}">${change.toFixed(2)}%</p>
                        </div>
                    `;
                }
                document.getElementById('status').innerText = 'Live';
            } catch (e) {
                document.getElementById('status').innerText = 'Sync Error: ' + e.message;
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>

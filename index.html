<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr X Pro Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500">Live Dashboard</h1>
        <div id="metrics" class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500 uppercase">F&G Index</p><p id="fng" class="text-xl font-bold">--</p></div>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500 uppercase">BTC DOM</p><p id="dom" class="text-xl font-bold">--%</p></div>
        </div>
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>
    <script>
        const proxy = "https://api.allorigins.win/get?url=";
        async function fetchJSON(url) {
            try {
                const res = await fetch(proxy + encodeURIComponent(url));
                const data = await res.json();
                return JSON.parse(data.contents);
            } catch(e) { return null; }
        }

        async function update() {
            // Load Metrics
            fetchJSON("https://api.alternative.me/fng/").then(d => { if(d) document.getElementById('fng').innerText = d.data[0].value; });
            fetchJSON("https://api.coingecko.com/api/v3/global").then(d => { if(d) document.getElementById('dom').innerText = d.data.market_cap_percentage.bitcoin.toFixed(1) + '%'; });
            
            // Load Prices
            try {
                const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
                const tickers = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                const targets = ["BTCUSDT", "ETHUSDT", "DOGEUSDT"];
                tickers.filter(t => targets.includes(t.symbol)).forEach(t => {
                    const price = parseFloat(t.lastPrice);
                    const sym = t.symbol.replace('USDT', '');
                    const priceDisplay = sym === 'DOGE' ? price.toFixed(5) : price.toLocaleString();
                    grid.innerHTML += `<div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center"><span class="text-slate-400 font-bold">${sym}</span><span class="font-bold text-lg">$${priceDisplay}</span></div>`;
                });
            } catch (e) { console.error(e); }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>

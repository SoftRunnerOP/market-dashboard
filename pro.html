<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-500">Live Dashboard</h1>
        <div id="grid" class="grid grid-cols-1 gap-4">
            <p class="text-slate-500 text-center">Syncing data...</p>
        </div>
    </div>
    <script>
        async function update() {
            try {
                // Fetch direct from the JSON file on GitHub
                const res = await fetch("data.json?t=" + new Date().getTime());
                const data = await res.json();
                
                let html = '<div class="grid grid-cols-2 gap-4 mb-4">';
                html += '<div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500">F&G</p><p class="text-xl font-bold">'+data.fng+'</p></div>';
                html += '<div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500">DOM</p><p class="text-xl font-bold">'+data.dom+'</p></div></div>';
                
                for (const [sym, info] of Object.entries(data.prices)) {
                    const color = info.change >= 0 ? 'text-green-500' : 'text-red-500';
                    const price = sym === 'DOGE' ? info.price.toFixed(5) : info.price.toLocaleString();
                    html += `
                        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex justify-between items-center">
                            <span class="text-slate-400 font-bold">${sym}</span>
                            <span class="font-bold text-lg">$${price} <span class="${color} text-sm">(${info.change.toFixed(2)}%)</span></span>
                        </div>
                    `;
                }
                document.getElementById('grid').innerHTML = html;
            } catch(e) { document.getElementById('grid').innerHTML = '<p class="text-red-500">Waiting for data...</p>'; }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>
